name: Build

on:
  push:
    paths-ignore:
      - "**.md"
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-mihomo:
    name: Build mihomo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mihomo
        uses: actions/checkout@v6
        with:
          repository: YuKongA/mihomo
          ref: Mishka

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Get mihomo version
        id: mihomo
        run: |
          VERSION="alpha-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build mihomo for Android arm64
        env:
          GOOS: android
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -v -tags "cmfa,mishka,with_gvisor" -trimpath \
            -ldflags "-s -w -X 'github.com/metacubex/mihomo/constant.Version=${{ steps.mihomo.outputs.version }}'" \
            -o libmihomo.so .

      - name: Compress mihomo with UPX
        run: |
          llvm-strip-18 --strip-all -o libmihomo_stripped.so libmihomo.so
          mv libmihomo_stripped.so libmihomo.so
          curl -Lo upx.tar.xz https://github.com/upx/upx/releases/download/v5.1.1/upx-5.1.1-amd64_linux.tar.xz
          tar -xf upx.tar.xz --strip-components=1 upx-5.1.1-amd64_linux/upx
          ./upx --best --lzma libmihomo.so

      - name: Upload mihomo artifact
        uses: actions/upload-artifact@v7
        with:
          path: libmihomo.so
          archive: false

  build-apk:
    name: Build APK
    needs: build-mihomo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download mihomo
        uses: actions/download-artifact@v8
        with:
          name: libmihomo.so
          path: android/src/main/jniLibs/arm64-v8a/

      - name: Build Debug APK
        run: ./gradlew :android:assembleDebug

      - name: Build Release APK
        run: ./gradlew :android:assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: Mishka-debug
          path: android/build/outputs/apk/debug/*.apk
          archive: false

      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: Mishka-release
          path: android/build/outputs/apk/release/*.apk
          archive: false
