name: Build

on:
  push:
    paths-ignore:
      - "**.md"
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-mihomo:
    name: Build mihomo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Mishka for version
        uses: actions/checkout@v6
        with:
          sparse-checkout: gradle.properties
          sparse-checkout-cone-mode: false
          path: mishka

      - name: Read mihomo version
        id: mihomo
        working-directory: mishka
        run: |
          VERSION=$(grep '^mihomo.version=' gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout mihomo
        uses: actions/checkout@v6
        with:
          repository: YuKongA/mihomo
          ref: Mishka
          path: mihomo

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: mihomo/go.mod

      - name: Build mihomo for Android arm64
        env:
          GOOS: android
          GOARCH: arm64
          CGO_ENABLED: 0
        working-directory: mihomo
        run: |
          go build -v -tags "cmfa,mishka,with_gvisor" -trimpath \
            -ldflags "-s -w -X 'github.com/metacubex/mihomo/constant.Version=${{ steps.mihomo.outputs.version }}'" \
            -o ../libmihomo.so .

      - name: Upload mihomo artifact
        uses: actions/upload-artifact@v7
        with:
          path: libmihomo.so
          archive: false

  build-apk:
    name: Build APK
    needs: build-mihomo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Download mihomo
        uses: actions/download-artifact@v8
        with:
          name: libmihomo.so
          path: android/src/main/jniLibs/arm64-v8a/

      - name: Download GeoIP files
        run: ./gradlew :android:downloadGeoFiles

      - name: Build Debug APK
        run: ./gradlew :android:assembleDebug

      - name: Build Release APK
        run: ./gradlew :android:assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: Mishka-debug
          path: android/build/outputs/apk/debug/*.apk
          archive: false

      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: Mishka-release
          path: android/build/outputs/apk/release/*.apk
          archive: false
